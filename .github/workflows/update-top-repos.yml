name: Update Top Repos by Stars

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/scripts/update-top-repos.js
      - .github/workflows/update-top-repos.yml
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update top repos section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: yyhuni
          TOP_REPOS_LIMIT: "6"
          MAINTAINED_REPOS: "xingfinger"
        run: node .github/scripts/update-top-repos.js

      - name: Commit and push if changed
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): update top repos by stars"
          git push
